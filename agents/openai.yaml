interface:
  display_name: "Conversation History Recovery"
  short_description: "Run a forensic conversation reconstruction, diagnose missed requirements and agent failures, then report or fix validated gaps"
  default_prompt: "Use $conversation-history-recovery-skill to perform a forensic reconstruction of this repo's Codex, Claude, clipboard history, Notion workspace history, repo-local, and git history. Read the selected conversations sequentially, inspect clipboard rows and Notion pages/databases directly, do both micro-analysis and thematic macro-analysis, identify explicit user problems, agent-driven failures, and implicit unresolved issues, then either return the structured forensic report or, if the user asked for execution, verify the current repo and fix the highest-confidence gaps."
